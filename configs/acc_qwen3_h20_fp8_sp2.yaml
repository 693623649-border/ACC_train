project_name: acc-qwen3-h20-native-fp8-sp2
seed: 42

model:
  name_or_path: Qwen/Qwen3-30B-A3B-Thinking-2507-FP8
  precision_mode: native_fp8_transformer_engine
  torch_dtype: auto
  attn_implementation: flash_attention_2
  trust_remote_code: false
  use_cache: false
  gradient_checkpointing: true
  allow_unsupported_fp8: false

precision:
  mode: native_fp8_transformer_engine
  mixed_precision: fp8
  fp8_backend: TE
  fp8_format: HYBRID
  amax_history_len: 1024
  amax_compute_algo: max
  margin: 0
  interval: 1
  override_linear_precision:
    - false
    - false
    - false
  use_autocast_during_eval: false
  require_transformer_engine: true
  trainable_parameter_dtype: auto

data:
  manifest_path: manifests/ACC_subset_4500_manifest.json
  raw_dir: data/acc_subset_4500
  tokenized_dir: data/tokenized_acc_4500_qwen3_fp8_128k
  min_seq_length: null
  max_seq_length: 131072
  pad_to_multiple_of: 8
  assistant_only_labels: true
  keep_think: true
  no_packing: true
  bucket_boundaries:
    - 8192
    - 16384
    - 32768
    - 49152
    - 65536
    - 81920
    - 98304
    - 114688
    - 131072

parallelism:
  backend: deepspeed_ulysses
  sp_backend: deepspeed
  sp_size: 2
  dp_replicate_size: 1
  sp_seq_length_is_variable: true
  sp_attn_implementation: flash_attention_2

training:
  output_dir: outputs/acc_qwen3_h20_native_fp8_sp2
  deepspeed_config: configs/deepspeed_zero3_fp8_sp2.json
  num_train_epochs: 1
  max_steps: -1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  global_batch_size: 16
  learning_rate: 1.0e-5
  min_learning_rate: 1.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  optim: adamw_torch
  adam_beta1: 0.9
  adam_beta2: 0.999
  weight_decay: 0.1
  max_grad_norm: 1.0
  cross_entropy_chunk_size: 1024
  run_name: acc-qwen3-h20-native-fp8-sp2
  logging_dir: outputs/acc_qwen3_h20_native_fp8_sp2/logs
  logging_steps: 1
  save_steps: 50
  save_total_limit: 3
  mixed_precision: fp8
  bf16: false
  fp16: false
  tf32: false
  dataloader_num_workers: 2
  remove_unused_columns: false
  report_to: wandb

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: none

router:
  train_router_gates: true
  name_regex: 'model\.layers\.\d+\.mlp\.gate'
  dtype: auto

assets:
  non_weight_dir: model_assets/Qwen3-30B-A3B-Thinking-2507-FP8-nonweights
